<app-title></app-title>

<app-section header="ACCOUNT INFORMATION"></app-section>

<form onsubmit="return false;">
  <fieldset class="flex flex-col">
    <label for="username">Username:</label>
    <input
      type="text"
      id="username"
      [formField]="page_signal.account_form.username"
      class="reusable-input"
    />

    <label for="password">Password:</label>
    <input
      type="password"
      id="password"
      [formField]="page_signal.account_form.password"
      class="reusable-input"
    />

    <p>{{ page_signal.message }}</p>
    <div class="flex justify-around">
      <button (click)="page_signal.reset()">reset</button>
      <button (click)="page_signal.click()">submit</button>
    </div>
  </fieldset>

  <app-section header="FUN QUESTIONS"></app-section>

  <fieldset>
    <legend>have you committed a felony?</legend>
    <input
      type="radio"
      value="true"
      id="felony-yes"
      [formField]="page_signal.felony_form.felony"
      class=""
    />
    <label for="felony-yes">yes</label>
    <input
      type="radio"
      value="false"
      id="felony-no"
      [formField]="page_signal.felony_form.felony"
      class=""
    />
    <label for="felony-no">no</label>
  </fieldset>

  <fieldset>
    <legend>what is your favorite fruits</legend>
    <input type="checkbox" id="fruit-apple" [formField]="page_signal.fruit_form.apple" class="" />
    <label for="fruit-apple">apple</label>
    <input type="checkbox" id="fruit-banana" [formField]="page_signal.fruit_form.banana" class="" />
    <label for="fruit-banana">banana</label>
  </fieldset>

  <fieldset>
    <legend>which country do you come from?</legend>
    <select>
      <option value="" disabled selected>Select a country</option>
      <option value="ca">Canada</option>
      <option value="us">United States</option>
      <option value="mx">Mexico</option>
    </select>
  </fieldset>

  <fieldset [hidden]="page_signal.fruit_form.banana().value()">
    <legend>what are your qualifications:</legend>
    <textarea name="message" id="message" rows="6" cols="50"></textarea>
  </fieldset>

  <button (click)="app_form.submit()">submit</button>
</form>
